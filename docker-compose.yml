services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leaderboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leaderboard}
      POSTGRES_DB: ${POSTGRES_DB:-leaderboard}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leaderboard}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
