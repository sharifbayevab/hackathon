{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white border rounded-2xl shadow-sm p-8 mt-8">
  <h1 class="text-2xl font-semibold mb-2">{{ t('home_title') }}</h1>
  <p class="text-slate-600 mb-6">{{ t('home_subtitle') }}</p>

  {% if error %}
    <div class="mb-4 p-3 bg-red-50 text-red-700 rounded text-sm">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login" class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">{{ t('full_name') }}</label>
      <input type="text" name="full_name" required
             class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">{{ t('group_name') }}</label>
      <input type="text" name="group_name" required
             class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
    </div>
    <button type="submit"
            class="w-full bg-slate-900 text-white py-2 rounded-lg hover:bg-slate-800 transition">
      {{ t('enter') }}
    </button>
  </form>
</div>
{% endblock %}
