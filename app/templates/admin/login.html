{% extends "base.html" %}
{% block content %}
<div class="max-w-sm mx-auto bg-white border rounded-2xl shadow-sm p-8 mt-8">
  <h1 class="text-xl font-semibold mb-6">{{ t('admin_login_title') }}</h1>
  {% if error %}
    <div class="mb-4 p-3 bg-red-50 text-red-700 rounded text-sm">{{ error }}</div>
  {% endif %}
  <form method="post" action="/admin/login" class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">{{ t('username') }}</label>
      <input type="text" name="username" required
             class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">{{ t('password') }}</label>
      <input type="password" name="password" required
             class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
    </div>
    <button type="submit"
            class="w-full bg-slate-900 text-white py-2 rounded-lg hover:bg-slate-800">
      {{ t('login') }}
    </button>
  </form>
</div>
{% endblock %}
